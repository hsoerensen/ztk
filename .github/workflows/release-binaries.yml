name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  binaries:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Zig
        env:
          ZIG_VERSION: 0.16.0
        run: |
          set -eu
          case "$(uname -m)" in
            arm64|aarch64) zig_arch=aarch64 ;;
            x86_64) zig_arch=x86_64 ;;
            *) echo "unsupported runner arch" >&2; exit 1 ;;
          esac
          archive="zig-${zig_arch}-macos-${ZIG_VERSION}"
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/${archive}.tar.xz"
          tar -xf "${archive}.tar.xz"
          echo "$PWD/${archive}" >> "$GITHUB_PATH"

      - name: Build and test
        run: |
          zig version
          zig build test
          zig build cross
          scripts/package-release.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
